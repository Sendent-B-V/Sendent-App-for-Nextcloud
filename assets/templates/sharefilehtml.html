<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
</head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;color:#333333;">
<table width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;background:#ffffff;">
  <tbody>

    <!-- HEADER -->
    <tr>
      <td align="center" style="background-color:#0D1136;padding:20px 24px 0 24px;">
        <img src="{LOGO}" width="120" height="28" alt="Logo" style="display:block;margin:0 auto;" />
      </td>
    </tr>
    <!-- Orange accent bar -->
    <tr>
      <td style="background-color:#0D1136;padding:14px 0 0 0;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr><td style="background-color:#F37D1E;height:3px;font-size:0;line-height:0;">&nbsp;</td></tr>
        </table>
      </td>
    </tr>

    <!-- INTRO TEXT -->
    <tr>
      <td style="padding:28px 28px 8px 28px;font-family:Arial,sans-serif;font-size:14px;line-height:1.7;color:#333333;">
        I'm sharing files with you using a secure file transfer service to protect your privacy. Click the button below to download your files.
      </td>
    </tr>

    <!-- CTA BUTTON -->
    <tr>
      <td align="center" style="padding:20px 28px 28px 28px;">
        <table cellpadding="0" cellspacing="0" border="0" width="220">
          <tr>
            <td align="center" width="220" style="background-color:#F37D1E;padding:12px 0;font-family:Arial,sans-serif;font-size:14px;font-weight:bold;">
              <a href="{URL}" style="color:#ffffff;text-decoration:none;display:block;width:100%;">
                &#8595; Download files
              </a>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- DATA BLOCK -->
    <tr>
      <td style="padding:0 28px 24px 28px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f5f9;border-left:3px solid #0D1136;">
          <tbody>
            <tr>
              <td width="150" valign="top" style="padding:14px 12px 6px 16px;font-family:Arial,sans-serif;font-size:12px;color:#888888;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;">
                Download link
              </td>
              <td valign="top" style="padding:14px 16px 6px 0;font-family:Arial,sans-serif;font-size:13px;color:#0D1136;word-break:break-all;">
                <a href="{URL}" style="color:#F37D1E;text-decoration:none;">{URL}</a>
              </td>
            </tr>
            <tr>
              <td width="150" valign="top" style="padding:6px 12px 6px 16px;font-family:Arial,sans-serif;font-size:12px;color:#888888;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;">
                Password
              </td>
              <td valign="top" style="padding:6px 16px 6px 0;font-family:Arial,sans-serif;font-size:13px;color:#0D1136;">
                <pre style="margin:0;font-family:Arial,sans-serif;font-size:13px;color:#0D1136;">{PASSWORD}</pre>
              </td>
            </tr>
            <tr>
              <td width="150" valign="top" style="padding:6px 12px 14px 16px;font-family:Arial,sans-serif;font-size:12px;color:#888888;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;">
                Expiration date
              </td>
              <td valign="top" style="padding:6px 16px 14px 0;font-family:Arial,sans-serif;font-size:13px;color:#0D1136;">
                {EXPIRATIONDATE}
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>

    <!-- FOOTER -->
    <tr>
      <td style="background-color:#f7f7f7;padding:14px 28px;border-top:1px solid #e8e8e8;font-family:Arial,sans-serif;font-size:11px;color:#999999;">
        Sent using <a href="https://www.sendent.nl/" style="color:#F37D1E;text-decoration:none;font-weight:bold;">Sendent</a> &mdash; a solution for secure email and file exchange.
      </td>
    </tr>

  </tbody>
</table>
</body>
</html>
